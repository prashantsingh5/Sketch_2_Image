name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile script/process_dataset.py
          python -m py_compile script/evaluate_metrics.py
          python -m py_compile script/update_benchmark_table.py
          python -m py_compile script/run_full_eval.py
          python -m py_compile script/doctor.py
          python -m py_compile demo/app.py
